<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #0b0e14; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        .input-card { 
            background: #1c2533; 
            border-radius: 12px; 
            padding: 16px 20px; 
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .label-text {
            color: #8a96a3;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .neon-yellow { color: #d4f000; }
        .bg-neon { background-color: #d4f000; color: #000; }

        .audio-container {
            background: #1c2533;
            border: 1px solid #2d3848;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        /* Hide content until Firebase data is ready to prevent "Old Data" flicker */
        #main-content { opacity: 0; transition: opacity 0.5s ease; }
        #main-content.ready { opacity: 1; }
        
        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: 800; color: #d4f000; font-size: 14px; text-transform: uppercase;
        }
    </style>
</head>
<body class="p-5 flex flex-col items-center min-h-screen">

    <div id="loader">Syncing Secure Gateway...</div>

    <div id="main-content" class="w-full max-w-md">
        <div class="flex justify-center mb-6 mt-4">
            <div class="w-16 h-16 bg-[#d4f000] rounded-full flex items-center justify-center">
                <i class="fas fa-dollar-sign text-3xl text-black"></i>
            </div>
        </div>

        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold mb-1">Pay For Stream</h1>
            <p class="text-gray-400 text-sm">Proceed to your bank app to complete this transaction.</p>
        </div>

        <div class="text-center mb-6">
            <p class="text-red-500 font-bold text-xs tracking-widest uppercase">
                <i class="fas fa-exclamation-triangle"></i> NOTE: DO NOT PAY WITH OPAY / PALMPAY
            </p>
        </div>

        <div class="audio-container">
            <div class="flex items-center justify-center gap-2 mb-3 neon-yellow font-bold text-[10px] uppercase tracking-widest">
                <i class="fas fa-volume-up"></i> Listen To : HOW IT'S WORK'S 
            </div>
            <audio controls class="w-full h-10">
                <source src="instructions.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="w-full">
            <label class="label-text">Account Number</label>
            <div class="input-card">
                <span id="acc-num" class="text-2xl font-bold tracking-[0.1em]">8052839670</span>
                <button onclick="copyData('acc-num')"><i class="far fa-copy text-gray-500 text-xl"></i></button>
            </div>

            <label class="label-text">Bank Name</label>
            <div class="input-card">
                <span id="bank-name" class="text-lg font-bold">Moniepoint MFB</span>
                <button onclick="copyData('bank-name')"><i class="far fa-copy text-gray-500 text-xl"></i></button>
            </div>

            <label class="label-text">Account Name</label>
            <div class="input-card">
                <span id="acc-name" class="text-lg font-bold">V Media Limited</span>
                <button onclick="copyData('acc-name')"><i class="far fa-copy text-gray-500 text-xl"></i></button>
            </div>

            <div class="input-card border-2 border-[#d4f000]/40 mt-4 bg-[#1c2533]">
                <div class="flex flex-col">
                    <span class="neon-yellow text-[10px] font-black uppercase tracking-tighter">Amount to Pay</span>
                    <span id="amount" class="text-3xl font-black neon-yellow">₦12,500</span>
                </div>
                <button onclick="copyData('amount')"><i class="far fa-copy neon-yellow text-xl"></i></button>
            </div>
        </div>

        <div class="mt-8 flex items-center justify-between px-2">
            <div>
                <p class="text-gray-500 text-[10px] font-bold uppercase">Details Expire In</p>
                <p id="timer" class="text-2xl font-black neon-yellow">59:59</p>
            </div>
            <div class="text-right">
                <i class="fas fa-shield-check text-[#d4f000] text-xl"></i>
                <p class="text-white text-[9px] font-bold uppercase">Secured</p>
            </div>
        </div>

        <button onclick="confirmPayment()" class="w-full bg-neon mt-8 py-5 rounded-2xl font-black text-lg uppercase shadow-2xl active:scale-95 transition-all">
            I HAVE PAID
        </button>

        <p class="mt-10 text-gray-600 text-[11px] font-bold uppercase tracking-widest text-center">
            <i class="fab fa-whatsapp"></i> Stream Support Community
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIMhc1FPvv2J1crNngZe185muphsDBptY",
            authDomain: "stream-web-9b268.firebaseapp.com",
            projectId: "stream-web-9b268",
            storageBucket: "stream-web-9b268.firebasestorage.app",
            messagingSenderId: "2861676032",
            appId: "1:2861676032:web:26a684aeca4ef2913b8ae5",
            measurementId: "G-89Q05YB2RY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let redirectUrl = "https://t.me/stream_support";

        async function connect() {
            try {
                await signInAnonymously(auth);
                // The key fix: Listen specifically for server updates to avoid old data
                onSnapshot(doc(db, 'system', 'payment_details'), { includeMetadataChanges: true }, (snap) => {
                    if(snap.exists()){
                        // Only hide loader and show content once we have data
                        const d = snap.data();
                        
                        // If it's the first load OR data is from server, update the UI
                        if (!snap.metadata.fromCache || snap.metadata.hasPendingWrites === false) {
                            document.getElementById('acc-num').innerText = d.accNum || "8052839670";
                            document.getElementById('bank-name').innerText = d.bank || "Moniepoint MFB";
                            document.getElementById('acc-name').innerText = d.name || "V Media Limited";
                            document.getElementById('amount').innerText = d.amount ? `₦${d.amount}` : "₦12,500";
                            redirectUrl = d.link || redirectUrl;

                            // Show the UI and hide loader
                            document.getElementById('loader').style.display = 'none';
                            document.getElementById('main-content').classList.add('ready');
                        }
                    }
                });
            } catch (e) { console.error("Database connection failed", e); }
        }
        connect();

        window.copyData = (id) => {
            const text = document.getElementById(id).innerText.replace('₦','').replace(',','');
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard");
        };

        window.confirmPayment = () => { window.location.href = redirectUrl; };

        // Timer Logic
        let seconds = 3600;
        setInterval(() => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (seconds > 0) seconds--;
        }, 1000);
    </script>
</body>
</html>
