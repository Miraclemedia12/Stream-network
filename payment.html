<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay For Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0d1117; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .neon-yellow { color: #ccff00; }
        .bg-neon { background-color: #ccff00; color: #000; }
        .input-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .audio-player { background: #1c2128; border: 1px solid #ccff0044; border-radius: 12px; padding: 15px; }
        
        #notif-box {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #161b22; border-left: 4px solid #ccff00; padding: 12px;
            border-radius: 12px; width: 90%; max-width: 320px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 999; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        #notif-box.show { bottom: 20px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md mt-6 text-center">
        <!-- Brand Icon -->
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border-4 border-neon-yellow mb-6">
            <i class="fas fa-dollar-sign text-4xl neon-yellow"></i>
        </div>

        <h1 class="text-3xl font-black mb-2 tracking-tight">Pay For Stream</h1>
        <p class="text-gray-400 text-sm mb-4 px-6">Proceed to your bank app to complete this transaction.</p>
        
        <p class="text-yellow-500 font-bold text-xs mb-6 uppercase tracking-wider">
            <i class="fas fa-exclamation-triangle"></i> NOTE: DO NOT PAY WITH OPAY
        </p>

        <!-- Instruction Player -->
        <div class="audio-player mb-8 text-left">
            <p class="text-[10px] neon-yellow font-bold uppercase mb-2 flex items-center gap-2">
                <i class="fas fa-volume-up"></i> LISTEN: HOW IT WORKS
            </p>
            <audio controls class="w-full h-8">
                <source src="instruction.mp3" type="audio/mpeg">
            </audio>
        </div>

        <!-- Payment Details -->
        <div class="space-y-1 text-left">
            <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Account Number</label>
            <div class="input-box">
                <span id="acc-num" class="text-xl font-black tracking-widest">Loading...</span>
                <button onclick="copyData('acc-num')"><i class="far fa-copy text-gray-500 text-lg"></i></button>
            </div>

            <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Bank Name</label>
            <div class="input-box">
                <span id="bank-name" class="font-bold">Loading...</span>
                <button onclick="copyData('bank-name')"><i class="far fa-copy text-gray-500"></i></button>
            </div>

            <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Account Name</label>
            <div class="input-box">
                <span id="acc-name" class="font-bold text-sm">Loading...</span>
                <button onclick="copyData('acc-name')"><i class="far fa-copy text-gray-500"></i></button>
            </div>

            <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Amount to Pay</label>
            <div class="input-box border-2 border-neon-yellow/50">
                <span id="amount" class="text-2xl font-black neon-yellow">Loading...</span>
                <button onclick="copyData('amount')"><i class="far fa-copy neon-yellow"></i></button>
            </div>
        </div>

        <!-- Expiry Timer -->
        <div class="mt-8 bg-yellow-900/10 p-4 rounded-xl border border-yellow-700/20">
            <p class="text-yellow-600 text-[10px] font-bold uppercase">Details expire in:</p>
            <div id="timer" class="text-2xl font-black neon-yellow">30:00</div>
        </div>

        <!-- Confirm Button -->
        <button onclick="confirmPayment()" class="w-full bg-neon mt-8 py-5 rounded-xl font-black flex items-center justify-center gap-3 text-lg uppercase shadow-xl shadow-lime-500/20 active:scale-95 transition-transform">
            <i class="fas fa-check-circle"></i> I Have Paid
        </button>

        <footer class="mt-12 pb-8 text-gray-500 text-sm flex items-center justify-center gap-2">
            <i class="fab fa-whatsapp"></i> <span class="font-bold">Join our Channel</span>
        </footer>
    </div>

    <!-- Live Activity Popup -->
    <div id="notif-box">
        <div class="w-10 h-10 rounded-full bg-neon flex items-center justify-center text-black flex-shrink-0">
            <i id="notif-icon" class="fas fa-user-check"></i>
        </div>
        <div class="flex-grow">
            <p id="notif-text" class="text-[11px] text-gray-200 leading-tight">...</p>
            <p class="text-[9px] text-gray-500 font-bold mt-1 uppercase">JUST NOW</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkgorFG60krBLmsTVwQYstWCcskaQseBo",
            authDomain: "stream-network-e020d.firebaseapp.com",
            projectId: "stream-network-e020d",
            storageBucket: "stream-network-e020d.firebasestorage.app",
            messagingSenderId: "1040435649935",
            appId: "1:1040435649935:web:b196efc160942b7e56bffa",
            measurementId: "G-0W2LJZ2R3Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let redirect = "https://t.me/stream_support";

        // Auto-connect to database
        async function connect() {
            try {
                await signInAnonymously(auth);
                // Listen to live settings
                onSnapshot(doc(db, 'settings', 'live_details'), (snap) => {
                    if(snap.exists()){
                        const d = snap.data();
                        document.getElementById('acc-num').innerText = d.accNum || "8052839670";
                        document.getElementById('bank-name').innerText = d.bank || "Moniepoint MFB";
                        document.getElementById('acc-name').innerText = d.name || "V Media";
                        document.getElementById('amount').innerText = d.amount ? `₦${d.amount}` : "₦12,000";
                        redirect = d.link || redirect;
                    }
                }, (err) => console.error("Snapshot error:", err));
            } catch (e) {
                console.error("Auth failed:", e);
            }
        }
        connect();

        window.copyData = (id) => {
            const val = document.getElementById(id).innerText.replace('₦','');
            const temp = document.createElement('textarea');
            temp.value = val;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("Copied to clipboard!");
        };

        window.confirmPayment = () => { window.location.href = redirect; };

        // Countdown
        let timeLeft = 1800;
        setInterval(() => {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeLeft > 0) timeLeft--;
        }, 1000);

        // Fake Activity Loop
        const names = ["Adekule", "Emeka", "Olawale", "Blessing", "Chidi", "Fatima", "Ibrahim"];
        function showNotif() {
            const name = names[Math.floor(Math.random() * names.length)];
            const isW = Math.random() > 0.5;
            const box = document.getElementById('notif-box');
            document.getElementById('notif-icon').className = isW ? "fas fa-money-bill-wave" : "fas fa-user-check";
            document.getElementById('notif-text').innerHTML = isW ? 
                `<b>${name}</b> just withdrew <b>₦${Math.floor(Math.random()*40+10)},000</b>` : 
                `<b>${name}</b> just activated <b>Stream Plus</b>`;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 5000);
            setTimeout(showNotif, 15000);
        }
        setTimeout(showNotif, 3000);
    </script>
</body>
</html>
