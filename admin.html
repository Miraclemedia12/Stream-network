<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | Secure Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); border: 1px solid #222; border-radius: 24px; }
        .neon-border:focus-within { border-color: #ccff00; box-shadow: 0 0 15px rgba(204, 255, 0, 0.1); }
        input { background: transparent !important; outline: none; width: 100%; color: white; }
        .btn-primary { background: #ccff00; color: #000; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(204, 255, 0, 0.2); }
        .btn-primary:disabled { opacity: 0.5; transform: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- LOGIN INTERFACE -->
    <div id="login-screen" class="w-full max-w-sm">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-halved text-2xl text-lime-400"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight">Admin Terminal</h1>
            <p class="text-gray-500 text-sm mt-1">Authorized Personnel Only</p>
        </div>

        <div class="glass-panel p-8 shadow-2xl">
            <div class="mb-5">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Username</label>
                <div class="flex items-center gap-3 border border-white/10 rounded-xl px-4 py-3.5 mt-1 neon-border bg-white/5">
                    <i class="fas fa-user text-gray-600 text-sm"></i>
                    <input type="text" id="user-id" placeholder="admin" autocomplete="off">
                </div>
            </div>

            <div class="mb-8">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Password</label>
                <div class="flex items-center gap-3 border border-white/10 rounded-xl px-4 py-3.5 mt-1 neon-border bg-white/5">
                    <i class="fas fa-lock text-gray-600 text-sm"></i>
                    <input type="password" id="user-pass" placeholder="••••••••">
                </div>
            </div>

            <button onclick="attemptLogin()" class="w-full btn-primary py-4 rounded-xl font-bold uppercase tracking-tighter text-sm">
                Authenticate Session
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-dash" class="hidden w-full max-w-2xl">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-black text-white">System Config</h1>
                <p class="text-xs text-lime-400 font-bold uppercase tracking-widest">Live Database Connection Active</p>
            </div>
            <button onclick="location.reload()" class="h-10 w-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center hover:bg-red-500/10 hover:border-red-500/50 hover:text-red-500 transition-all">
                <i class="fas fa-power-off"></i>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Left Side Inputs -->
            <div class="glass-panel p-6 space-y-5">
                <h3 class="text-xs font-bold text-gray-400 uppercase border-b border-white/5 pb-3">Payment Information</h3>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Account Number</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5 focus-within:border-lime-500/50 transition-all">
                        <input type="text" id="db-acc" class="text-sm font-semibold">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Bank Name</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5 focus-within:border-lime-500/50 transition-all">
                        <input type="text" id="db-bank" class="text-sm font-semibold">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Account Holder Name</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5 focus-within:border-lime-500/50 transition-all">
                        <input type="text" id="db-name" class="text-sm font-semibold">
                    </div>
                </div>
            </div>

            <!-- Right Side Inputs -->
            <div class="glass-panel p-6 space-y-5">
                <h3 class="text-xs font-bold text-gray-400 uppercase border-b border-white/5 pb-3">Gateway & Pricing</h3>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Pricing (₦)</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5 focus-within:border-lime-500/50 transition-all">
                        <input type="text" id="db-amt" class="text-sm font-semibold text-lime-400">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Redirect URL</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5 focus-within:border-lime-500/50 transition-all">
                        <input type="text" id="db-link" class="text-sm font-semibold">
                    </div>
                </div>

                <div class="pt-2">
                    <button id="update-btn" onclick="commitChanges()" class="w-full btn-primary py-4 rounded-xl font-bold uppercase text-xs">
                        <i class="fas fa-cloud-arrow-up mr-2"></i> Commit Changes
                    </button>
                </div>
            </div>
        </div>
        
        <p id="feedback" class="text-center mt-6 text-xs font-bold uppercase transition-all opacity-0"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkgorFG60krBLmsTVwQYstWCcskaQseBo",
            authDomain: "stream-network-e020d.firebaseapp.com",
            projectId: "stream-network-e020d",
            storageBucket: "stream-network-e020d.firebasestorage.app",
            messagingSenderId: "1040435649935",
            appId: "1:1040435649935:web:b196efc160942b7e56bffa",
            measurementId: "G-0W2LJZ2R3Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        getAnalytics(app);

        window.attemptLogin = async () => {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;

            if(user === "admin" && pass === "stream2026") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dash').classList.remove('hidden');
                
                try {
                    await signInAnonymously(auth);
                    const snap = await getDoc(doc(db, 'settings', 'live_details'));
                    if(snap.exists()){
                        const data = snap.data();
                        document.getElementById('db-acc').value = data.accNum || "";
                        document.getElementById('db-bank').value = data.bank || "";
                        document.getElementById('db-name').value = data.name || "";
                        document.getElementById('db-amt').value = data.amount || "";
                        document.getElementById('db-link').value = data.link || "";
                    }
                } catch (e) {
                    showFeedback("Auth Error: Check Firebase Rules", false);
                }
            } else {
                alert("Invalid Credentials");
            }
        };

        window.commitChanges = async () => {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';

            try {
                await setDoc(doc(db, 'settings', 'live_details'), {
                    accNum: document.getElementById('db-acc').value,
                    bank: document.getElementById('db-bank').value,
                    name: document.getElementById('db-name').value,
                    amount: document.getElementById('db-amt').value,
                    link: document.getElementById('db-link').value,
                    updatedAt: new Date().toISOString()
                });
                showFeedback("Database Updated Successfully", true);
            } catch (e) {
                showFeedback("Write Permission Denied", false);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-arrow-up mr-2"></i> Commit Changes';
            }
        };

        function showFeedback(msg, success) {
            const f = document.getElementById('feedback');
            f.innerText = msg;
            f.className = `text-center mt-6 text-xs font-bold uppercase transition-all ${success ? 'text-lime-400' : 'text-red-500'}`;
            f.style.opacity = "1";
            setTimeout(() => f.style.opacity = "0", 3000);
        }
    </script>
</body>
</html>
