<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Admin | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            background-color: #0a0a0a;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
        }
        .admin-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 16px;
        }
        .neon-yellow { color: #ccff00; }
        .bg-neon { background-color: #ccff00; color: #000; }
        input {
            background: #1a1a1a !important;
            border: 1px solid #333 !important;
            color: white !important;
        }
        input:focus {
            border-color: #ccff00 !important;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-6">
        <div class="admin-card w-full max-w-sm p-8 text-center">
            <div class="w-16 h-16 bg-neon rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black mb-6">Admin Access</h1>
            <form id="loginForm" onsubmit="return false;">
                <input type="text" id="admin-user" placeholder="Username" class="w-full p-3 rounded-lg mb-4 text-sm">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 rounded-lg mb-6 text-sm">
                <button type="button" onclick="checkLogin()" class="w-full bg-neon py-3 rounded-lg font-bold uppercase tracking-widest active:scale-95 transition-transform">
                    Login
                </button>
            </form>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden">Invalid credentials. Try again.</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden w-full max-w-2xl mt-4">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black neon-yellow">Stream Dashboard</h2>
                <p class="text-gray-500 text-xs">Manage Payment Details & Redirects</p>
            </div>
            <button onclick="location.reload()" class="text-gray-400 hover:text-white">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </header>

        <div class="admin-card p-6 space-y-6">
            <div class="flex items-center gap-3 text-neon-yellow border-b border-gray-800 pb-4">
                <i class="fas fa-university"></i>
                <h3 class="font-bold uppercase tracking-widest text-sm">Bank Account Settings</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block ml-1">Account Number</label>
                    <input type="text" id="db-acc-num" class="w-full p-3 rounded-lg text-sm" placeholder="e.g. 8052839670">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block ml-1">Bank Name</label>
                    <input type="text" id="db-bank-name" class="w-full p-3 rounded-lg text-sm" placeholder="e.g. Moniepoint MFB">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block ml-1">Account Name</label>
                    <input type="text" id="db-acc-name" class="w-full p-3 rounded-lg text-sm" placeholder="e.g. V Media">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block ml-1">Amount (Naira)</label>
                    <input type="text" id="db-amount" class="w-full p-3 rounded-lg text-sm" placeholder="e.g. 12,000">
                </div>
            </div>

            <div class="pt-4">
                <div class="flex items-center gap-3 text-neon-yellow border-b border-gray-800 pb-4 mb-4">
                    <i class="fab fa-telegram"></i>
                    <h3 class="font-bold uppercase tracking-widest text-sm">Redirect Link (I Have Paid)</h3>
                </div>
                <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block ml-1">Telegram/Support URL</label>
                <input type="text" id="db-link" class="w-full p-3 rounded-lg text-sm" placeholder="https://t.me/...">
            </div>

            <button id="update-btn" onclick="updateSettings()" class="w-full bg-neon py-4 rounded-xl font-black text-lg uppercase shadow-lg shadow-lime-500/10 active:scale-95 transition-transform mt-4">
                <i class="fas fa-sync-alt mr-2"></i> Update Live Details
            </button>
            <p id="status-msg" class="text-center text-xs font-bold uppercase tracking-widest hidden"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global instances
        let db, auth, appId;
        let firebaseReady = false;

        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            firebaseReady = true;

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
        } catch (e) {
            console.warn("Firebase config missing. Running in local UI mode.");
        }

        // LOGIN SYSTEM
        window.checkLogin = () => {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            
            // LOGINS DETAILS (Username: admin | Pass: stream2026)
            if (user === "admin" && pass === "stream2026") {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                if(firebaseReady) loadCurrentData();
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        };

        // LOAD DATA FROM FIREBASE
        async function loadCurrentData() {
            onAuthStateChanged(auth, async (user) => {
                if (user && firebaseReady) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'paymentSettings');
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('db-acc-num').value = data.accountNumber || "";
                        document.getElementById('db-bank-name').value = data.bankName || "";
                        document.getElementById('db-acc-name').value = data.accountName || "";
                        document.getElementById('db-amount').value = data.amount || "";
                        document.getElementById('db-link').value = data.telegramLink || "";
                    }
                }
            });
        }

        // UPDATE DATA IN FIREBASE
        window.updateSettings = async () => {
            if (!firebaseReady) {
                alert("Database not connected. Please check your Firebase configuration.");
                return;
            }
            
            const btn = document.getElementById('update-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true;
            btn.innerText = "UPDATING...";

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'paymentSettings');
                await setDoc(docRef, {
                    accountNumber: document.getElementById('db-acc-num').value,
                    bankName: document.getElementById('db-bank-name').value,
                    accountName: document.getElementById('db-acc-name').value,
                    amount: document.getElementById('db-amount').value,
                    telegramLink: document.getElementById('db-link').value
                }, { merge: true });

                status.innerText = "✓ SETTINGS UPDATED SUCCESSFULLY";
                status.className = "text-center text-xs font-bold uppercase tracking-widest text-green-500 mt-4";
                status.classList.remove('hidden');
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Permission Denied or Connection Lost";
                status.className = "text-center text-xs font-bold uppercase tracking-widest text-red-500 mt-4";
                status.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt mr-2"></i> Update Live Details';
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        };
    </script>
</body>
</html>
